services:
  redis:
    image: redis:7-alpine
    restart: always

  bot:
    build: .
    restart: always
    command: python bot.py
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./temp_uploads:/app/temp_uploads

  worker:
    build: .
    restart: always
    command: python worker.py
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./temp_uploads:/app/temp_uploads

volumes:
  temp_uploads:
