services:
  redis:
    image: redis:7-alpine
    restart: always

  bot:
    build: .
    restart: always
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    volumes:
      - ./temp_uploads:/app/temp_uploads
      - cache_data:/root/.cache/yt-dlp
    deploy:
      resources:
        limits:
          memory: 4G # Allocate sufficient RAM for VPS media intensive FFmpeg ops

volumes:
  cache_data:
